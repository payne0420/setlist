name: Build Release

on:
  # Auto-build whenever a GitHub Release is published (the normal path).
  release:
    types: [published]
  # Manual path: re-run for an existing tag (e.g. to backfill assets) or for testing.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g., v2.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve the target tag from whichever event fired:
  #   workflow_dispatch -> inputs.tag
  #   release published -> event.release.tag_name
  #   fallback          -> github.ref_name
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.r.outputs.tag }}
    steps:
      - id: r
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.event.release.tag_name }}"; fi
          if [ -z "$TAG" ]; then TAG="${{ github.ref_name }}"; fi
          if [ -z "$TAG" ]; then echo "::error::Could not resolve a release tag"; exit 1; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp
          $ffmpegDir = Get-ChildItem -Path ffmpeg-temp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Path ffmpeg -Force
          Copy-Item -Path "$($ffmpegDir.FullName)\bin\ffmpeg.exe" -Destination ffmpeg\
          Copy-Item -Path "$($ffmpegDir.FullName)\bin\ffprobe.exe" -Destination ffmpeg\
          Remove-Item -Recurse -Force ffmpeg-temp, ffmpeg.zip
          Get-ChildItem ffmpeg

      - name: Install dependencies
        run: |
          pip install -r req.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Setlist.spec

      - name: Rename executable
        run: |
          move dist\Setlist.exe dist\Setlist-Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/Setlist-Windows.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon-x11-0 \
            libegl1 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Download FFmpeg (linux x86_64, static)
        run: |
          # GitHub-hosted static x86_64 ffmpeg. The previous source
          # (johnvansickle.com) is flaky and intermittently serves a tiny error
          # page instead of the tarball, which silently breaks the whole release
          # (upload-release needs every build to succeed).
          FF_TAG="b6.1.1"
          BASE="https://github.com/eugeneware/ffmpeg-static/releases/download/${FF_TAG}"
          mkdir -p ffmpeg
          curl -fL --retry 5 --retry-delay 3 --retry-all-errors -o ffmpeg/ffmpeg  "${BASE}/ffmpeg-linux-x64"
          curl -fL --retry 5 --retry-delay 3 --retry-all-errors -o ffmpeg/ffprobe "${BASE}/ffprobe-linux-x64"
          chmod +x ffmpeg/ffmpeg ffmpeg/ffprobe
          file ffmpeg/ffmpeg ffmpeg/ffprobe
          # Fail fast if we didn't actually get a valid x86-64 ELF binary.
          file ffmpeg/ffmpeg | grep -q "ELF 64-bit" || { echo "::error::Downloaded ffmpeg is not a valid ELF binary"; exit 1; }
          ./ffmpeg/ffmpeg -version | head -1
          ls -la ffmpeg/

      - name: Install dependencies
        run: |
          pip install -r req.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Setlist.spec

      - name: Rename and set permissions
        run: |
          mv dist/Setlist dist/Setlist-Linux
          chmod +x dist/Setlist-Linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/Setlist-Linux

  build-macos:
    name: Build macOS
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Download FFmpeg (arm64 to match the macos-14 Apple Silicon runner)
        run: |
          # evermeet.cx ships x86_64-only ffmpeg; the macos-14 runner is arm64 and
          # PyInstaller builds an arm64 app, so we need an arm64-native ffmpeg here.
          # eugeneware/ffmpeg-static publishes per-arch static binaries (pinned tag).
          FF_TAG="b6.1.1"
          BASE="https://github.com/eugeneware/ffmpeg-static/releases/download/${FF_TAG}"
          mkdir -p ffmpeg
          curl -fL -o ffmpeg/ffmpeg  "${BASE}/ffmpeg-darwin-arm64"
          curl -fL -o ffmpeg/ffprobe "${BASE}/ffprobe-darwin-arm64"
          chmod +x ffmpeg/ffmpeg ffmpeg/ffprobe
          file ffmpeg/ffmpeg ffmpeg/ffprobe
          # Fail fast if the bundled ffmpeg arch does not match the build arch.
          HOST_ARCH="$(uname -m)"   # arm64 on macos-14
          if ! file ffmpeg/ffmpeg | grep -q "arm64"; then
            echo "::error::Bundled ffmpeg is not arm64 (build host is ${HOST_ARCH})"; exit 1
          fi
          ./ffmpeg/ffmpeg -version | head -1
          ls -la ffmpeg/

      - name: Install dependencies
        run: |
          pip install -r req.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller Setlist.spec

      - name: Verify FFmpeg is bundled in the app (correct arch + runs)
        run: |
          APP="dist/Setlist.app"
          BUNDLED="$(find "$APP" -name ffmpeg -type f | head -1)"
          echo "Bundled ffmpeg: ${BUNDLED:-<none>}"
          test -n "$BUNDLED" || { echo "::error::ffmpeg was not bundled into Setlist.app"; exit 1; }
          file "$BUNDLED"
          file "$BUNDLED" | grep -q "arm64" || { echo "::error::Bundled ffmpeg has wrong arch"; exit 1; }
          "$BUNDLED" -version | head -1

      - name: Create ZIP
        run: |
          cd dist
          zip -r Setlist-macOS.zip Setlist.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Setlist-macOS.zip

  upload-release:
    name: Upload to Release
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-windows, build-linux, build-macos]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: |
            artifacts/windows-build/Setlist-Windows.exe
            artifacts/linux-build/Setlist-Linux
            artifacts/macos-build/Setlist-macOS.zip

  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    needs: [resolve-tag, upload-release]
    # Don't rewrite the cask for prerelease/test tags (e.g. v2.1.0-rc1): skip if the
    # release is marked prerelease, OR the tag carries a pre-release suffix (a hyphen).
    # The hyphen check also covers manual workflow_dispatch runs, which have no release
    # payload (so .prerelease is empty and the first clause alone would let them through).
    if: ${{ github.event.release.prerelease != true && !contains(needs.resolve-tag.outputs.tag, '-') }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get macOS asset SHA256
        id: get-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait for release assets to be fully available
          sleep 10

          # Get the SHA256 from the release asset digest
          SHA256=$(gh api repos/${{ github.repository }}/releases/tags/${{ needs.resolve-tag.outputs.tag }} \
            --jq '.assets[] | select(.name == "Setlist-macOS.zip") | .digest' | sed 's/sha256://')

          if [ -z "$SHA256" ]; then
            echo "Failed to get SHA256, calculating manually..."
            gh release download ${{ needs.resolve-tag.outputs.tag }} --pattern "Setlist-macOS.zip" --dir /tmp
            SHA256=$(sha256sum /tmp/Setlist-macOS.zip | cut -d' ' -f1)
          fi

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ needs.resolve-tag.outputs.tag }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update cask file
        run: |
          # Update version
          sed -i 's/version "[^"]*"/version "${{ steps.version.outputs.version }}"/' Casks/setlist.rb

          # Update SHA256 (handles both quoted strings and :no_check symbol)
          sed -i 's/sha256 "[^"]*"/sha256 "${{ steps.get-sha.outputs.sha256 }}"/' Casks/setlist.rb
          sed -i 's/sha256 :no_check/sha256 "${{ steps.get-sha.outputs.sha256 }}"/' Casks/setlist.rb

          echo "Updated cask file:"
          cat Casks/setlist.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/setlist.rb
          git commit -m "chore(homebrew): auto-update cask to ${{ needs.resolve-tag.outputs.tag }}" || echo "No changes to commit"
          git push origin main
